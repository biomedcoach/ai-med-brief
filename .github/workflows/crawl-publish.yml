name: China AI Health — Daily Update

on:
  # Schedule: 12:00, 17:00, 20:00 CST (UTC+8)
  - cron: '0 4 * * *'   # 12:00 CST
  - cron: '0 9 * * *'   # 17:00 CST
  - cron: '0 12 * * *'  # 20:00 CST
  # Publish at 01:00 CST = 17:00 UTC (auto-select + generate site)
  - cron: '0 17 * * *'  # 01:00 CST next day
  # Manual trigger
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - crawl-only
          - translate-only

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Crawl & Translate ───────────────────────────────
  crawl-translate:
    runs-on: ubuntu-latest
    if: inputs.mode == 'full' || inputs.mode == 'crawl-only' || github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests pyyaml beautifulsoup4 lxml
          pip install playwright
          playwright install chromium

      - name: Run crawler
        working-directory: backend
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        run: python crawl.py

      - name: Run translation (technical-expert style)
        working-directory: backend
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        run: python translate.py

      - name: Run humanizer (remove AI patterns)
        working-directory: backend
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        run: python humanize.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/
          git diff --cached --quiet || git commit -m "data: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

  # ── Select + Publish ────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    if: inputs.mode == 'full' || inputs.mode == '' || github.event_name == 'schedule'
    needs: [crawl-translate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Auto-select top articles
        working-directory: backend
        run: python select.py --auto

      - name: Generate static site
        working-directory: backend
        run: python publish.py

      - name: Copy site to docs/
        run: |
          mkdir -p docs
          cp index.html docs/
          cp -r articles/ docs/
          # Also copy data for archive
          cp backend/data/selected/*.json docs/

      - name: Commit site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "site: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

  # ── Deploy to GitHub Pages ─────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'schedule'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
